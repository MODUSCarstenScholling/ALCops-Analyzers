name: Test Report

# Publishes test results for all workflows using dorny/test-reporter.
# This runs as a separate workflow_run-triggered workflow so that:
# 1. Fork PRs get test reports (fork PRs have read-only GITHUB_TOKEN)
# 2. Test reporting is centralized in one place (DRY)
# See: https://github.com/dorny/test-reporter#recommended-setup-for-public-repositories

on:
  workflow_run:
    workflows: ['Pull Request', 'CI/CD', 'Scheduled Build']
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  report:
    if: >-
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    name: Report
    steps:
      - uses: actions/checkout@v6

      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish unified test report
        uses: dorny/test-reporter@v3
        with:
          name: Test results
          report-title: 'ALCops Test Results'
          path: "**/*.trx"
          reporter: dotnet-trx
          use-actions-summary: 'false'
          list-suites: 'failed'
          list-tests: 'failed'
          collapsed: 'never'
          fail-on-error: true
          fail-on-empty: true
