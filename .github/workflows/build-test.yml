name: Build and Test

on:
  workflow_call:
    inputs:
      draft-check:
        description: "Whether to check if PR is draft"
        required: false
        type: boolean
        default: true
    outputs:
      bc-devtools-sources:
        description: "BC DevTools sources"
        value: ${{ jobs.setup.outputs.bc-devtools-sources }}
      tfm-netstandard21-version-lowest:
        description: "Target framework netstandard2.1 lowest version"
        value: ${{ jobs.setup.outputs.tfm-netstandard21-version-lowest }}
      tfm-net80-version-lowest:
        description: "Target framework net8.0 lowest version"
        value: ${{ jobs.setup.outputs.tfm-net80-version-lowest }}
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true

jobs:
  setup:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    name: Setup
    steps:
      - uses: actions/checkout@v6

      - name: Get BC DevTools
        id: get-bc-devtools
        uses: ./.github/actions/get-bc-devtools

      - name: Setup matrix for test
        id: setup-test-matrix
        uses: ./.github/actions/setup-test-matrix
        with:
          sources: ${{ steps.get-bc-devtools.outputs.sources }}

    outputs:
      bc-devtools-sources: ${{ steps.get-bc-devtools.outputs.sources }}
      tfm-netstandard21-version-lowest: ${{ steps.get-bc-devtools.outputs.tfm-netstandard21-version-lowest }}
      tfm-net80-version-lowest: ${{ steps.get-bc-devtools.outputs.tfm-net80-version-lowest }}
      matrix: ${{ steps.setup-test-matrix.outputs.matrix }}

  build:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    needs: setup
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup BC DevTools (v${{ needs.setup.outputs.tfm-netstandard21-version-lowest }})
        uses: ./.github/actions/setup-bc-devtools
        with:
          sources: ${{ needs.setup.outputs.bc-devtools-sources }}
          version-number: ${{ needs.setup.outputs.tfm-netstandard21-version-lowest }}
          target-path: Microsoft.Dynamics.BusinessCentral.Development.Tools/netstandard2.1

      - name: Setup BC DevTools (v${{ needs.setup.outputs.tfm-net80-version-lowest }})
        uses: ./.github/actions/setup-bc-devtools
        with:
          sources: ${{ needs.setup.outputs.bc-devtools-sources }}
          version-number: ${{ needs.setup.outputs.tfm-net80-version-lowest }}
          target-path: Microsoft.Dynamics.BusinessCentral.Development.Tools/net8.0

      # ALCops.Common
      - name: Restore ALCops.Common
        run: dotnet restore ./src/ALCops.Common/ALCops.Common.csproj

      - name: Build ALCops.Common
        run: dotnet build ./src/ALCops.Common/ALCops.Common.csproj --configuration Release --no-restore

      # ALCops.ApplicationCop
      - name: Restore ALCops.ApplicationCop
        run: dotnet restore ./src/ALCops.ApplicationCop/ALCops.ApplicationCop.csproj

      - name: Build ALCops.ApplicationCop
        run: dotnet build ./src/ALCops.ApplicationCop/ALCops.ApplicationCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.ApplicationCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.ApplicationCop
          path: ./src/ALCops.ApplicationCop/bin/Release/

      # ALCops.DocumentationCop
      - name: Restore ALCops.DocumentationCop
        run: dotnet restore ./src/ALCops.DocumentationCop/ALCops.DocumentationCop.csproj

      - name: Build ALCops.DocumentationCop
        run: dotnet build ./src/ALCops.DocumentationCop/ALCops.DocumentationCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.DocumentationCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.DocumentationCop
          path: ./src/ALCops.DocumentationCop/bin/Release/

      # ALCops.FormattingCop
      - name: Restore ALCops.FormattingCop
        run: dotnet restore ./src/ALCops.FormattingCop/ALCops.FormattingCop.csproj

      - name: Build ALCops.FormattingCop
        run: dotnet build ./src/ALCops.FormattingCop/ALCops.FormattingCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.FormattingCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.FormattingCop
          path: ./src/ALCops.FormattingCop/bin/Release/

      # ALCops.LinterCop
      - name: Restore ALCops.LinterCop
        run: dotnet restore ./src/ALCops.LinterCop/ALCops.LinterCop.csproj

      - name: Build ALCops.LinterCop
        run: dotnet build ./src/ALCops.LinterCop/ALCops.LinterCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.LinterCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.LinterCop
          path: ./src/ALCops.LinterCop/bin/Release/          

      # ALCops.PlatformCop
      - name: Restore ALCops.PlatformCop
        run: dotnet restore ./src/ALCops.PlatformCop/ALCops.PlatformCop.csproj

      - name: Build ALCops.PlatformCop
        run: dotnet build ./src/ALCops.PlatformCop/ALCops.PlatformCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.PlatformCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.PlatformCop
          path: ./src/ALCops.PlatformCop/bin/Release/

      # ALCops.TestAutomationCop
      - name: Restore ALCops.TestAutomationCop
        run: dotnet restore ./src/ALCops.TestAutomationCop/ALCops.TestAutomationCop.csproj

      - name: Build ALCops.TestAutomationCop
        run: dotnet build ./src/ALCops.TestAutomationCop/ALCops.TestAutomationCop.csproj --configuration Release --no-restore

      - name: Upload ALCops.TestAutomationCop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALCops.TestAutomationCop
          path: ./src/ALCops.TestAutomationCop/bin/Release/          

  test:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    needs: [setup, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    name: Test v${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup BC v${{ matrix.version }} DevTools
        id: setup-bc-devtools
        uses: ./.github/actions/setup-bc-devtools
        with:
          sources: ${{ needs.setup.outputs.bc-devtools-sources }}
          version-number: ${{ matrix.version }}
          target-path: Microsoft.Dynamics.BusinessCentral.Development.Tools/net8.0 # Always use net8.0 target folder for testing

      # ALCops.ApplicationCop
      - name: Download ALCops.ApplicationCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.ApplicationCop
          path: ./src/ALCops.ApplicationCop/bin/Release/

      - name: Restore ALCops.ApplicationCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.ApplicationCop.Test/ALCops.ApplicationCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.ApplicationCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.ApplicationCop.Test/ALCops.ApplicationCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=ApplicationCop_AL_${{ matrix.version }}.trx"

      # ALCops.DocumentationCop
      - name: Download ALCops.DocumentationCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.DocumentationCop
          path: ./src/ALCops.DocumentationCop/bin/Release/

      - name: Restore ALCops.DocumentationCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.DocumentationCop.Test/ALCops.DocumentationCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.DocumentationCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.DocumentationCop.Test/ALCops.DocumentationCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=DocumentationCop_AL_${{ matrix.version }}.trx"
          
      # ALCops.FormattingCop
      - name: Download ALCops.FormattingCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.FormattingCop
          path: ./src/ALCops.FormattingCop/bin/Release/

      - name: Restore ALCops.FormattingCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.FormattingCop.Test/ALCops.FormattingCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.FormattingCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.FormattingCop.Test/ALCops.FormattingCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=FormattingCop_AL_${{ matrix.version }}.trx"

      # ALCops.LinterCop
      - name: Download ALCops.LinterCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.LinterCop
          path: ./src/ALCops.LinterCop/bin/Release/

      - name: Restore ALCops.LinterCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.LinterCop.Test/ALCops.LinterCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.LinterCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.LinterCop.Test/ALCops.LinterCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=LinterCop_AL_${{ matrix.version }}.trx"          

      # ALCops.PlatformCop
      - name: Download ALCops.PlatformCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.PlatformCop
          path: ./src/ALCops.PlatformCop/bin/Release/

      - name: Restore ALCops.PlatformCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.PlatformCop.Test/ALCops.PlatformCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.PlatformCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.PlatformCop.Test/ALCops.PlatformCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=PlatformCop_AL_${{ matrix.version }}.trx"    

      # ALCops.TestAutomationCop
      - name: Download ALCops.TestAutomationCop biniaries
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ALCops.TestAutomationCop
          path: ./src/ALCops.TestAutomationCop/bin/Release/

      - name: Restore ALCops.TestAutomationCop.Test
        continue-on-error: true
        run: dotnet restore ./src/ALCops.TestAutomationCop.Test/ALCops.TestAutomationCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run ALCops.TestAutomationCop.Test
        continue-on-error: true
        run: >
          dotnet test ./src/ALCops.TestAutomationCop.Test/ALCops.TestAutomationCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=TestAutomationCop_AL_${{ matrix.version }}.trx"              

      - name: Install dotnet-trx-merge
        if: always()
        run: |
          dotnet tool install --global dotnet-trx-merge

      - name: Merge Test Results
        if: always()
        run: |
          trx-merge --dir ./TestResults/ --output ./TestResults_${{ matrix.version }}.trx
          
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.version }}
          path: |
            **/TestResults_${{ matrix.version }}.trx
  report:
    if: ${{ always() && (!inputs.draft-check || github.event.pull_request.draft == false) }}
    needs: [setup, build, test]
    runs-on: ubuntu-latest
    name: Report
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all test artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: test-*
          merge-multiple: true

      - name: Publish unified test report
        uses: dorny/test-reporter@v2
        with:
          name: Test results
          report-title: 'ALCops Test Results'
          path: "**/*.trx"
          reporter: dotnet-trx
          use-actions-summary: 'false'
          list-suites: 'failed'
          list-tests: 'failed'
          collapsed: auto
          fail-on-error: true
          fail-on-empty: true